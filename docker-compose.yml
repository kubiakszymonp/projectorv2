services:
  backend:
    # Pre-built multi-arch image (see .github/workflows/docker-build.yml).
    # On the Pi: `docker compose pull && docker compose up -d`.
    # To build locally instead, the `build:` block below is used as fallback.
    image: ghcr.io/kubiakszymonp/projector-backend:latest
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: projector-backend
    ports:
      - "10000:10000"
    environment:
      - PORT=10000
      - NODE_ENV=production
    volumes:
      - ./data:/app/data
    networks:
      - projector-network
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:10000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    image: ghcr.io/kubiakszymonp/projector-frontend:latest
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: projector-frontend
    ports:
      - "10001:10001"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - projector-network
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:10001/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  projector-network:
    driver: bridge

